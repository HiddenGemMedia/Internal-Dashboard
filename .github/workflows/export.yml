name: Export Performance Dashboard

on:
  # Triggered by n8n via GitHub API
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run export script
        run: python Dashboard/scripts/export_performance_workbook.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dashboard/Data/performance-dashboard.json
          git diff --staged --quiet || git commit -m "chore: auto-update performance-dashboard.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
